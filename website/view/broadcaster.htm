<div class="social-wrapper">
    <div class="composer-side">
        <h2>Broadcast</h2>
        <form id="broadcast-form">
            <textarea id="post-content" placeholder="Write once..."></textarea>
            
            <div class="platform-chips">
                <label><input type="checkbox" name="p" value="ln"> LinkedIn</label>
                <label><input type="checkbox" name="p" value="tw"> X</label>
                <label><input type="checkbox" name="p" value="ms"> Mastodon</label>
            </div>

            <button type="submit" class="send-btn">Add to Queue</button>
        </form>
    </div>

    <div class="queue-side">
        <h2>Queue</h2>
        <div id="social-queue">
            <p class="empty-msg">Airwaves are silent.</p>
        </div>
    </div>
</div>
