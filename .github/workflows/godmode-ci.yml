name: Neural Lab CI (God Mode Diagnostics)

on: [push, pull_request]

jobs:
  diagnostic-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, curl, mbstring
          tools: phpunit

      - name: Install Dependencies (Remote Composer)
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Integrity Check (Syntax & Linting)
        run: find php/src -name "*.php" -exec php -l {} \;

      - name: Run Unit Tests (Logic & Connectivity)
        run: vendor/bin/phpunit --testdox