server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.php;

    # location / {
    #     try_files $uri $uri/ =404;
    # }

    # # Pass PHP scripts to FastCGI server
    # location ~ \.php$ {
    #     fastcgi_pass php:9000;
    #     fastcgi_index index.php;
    #     fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    #     include fastcgi_params;
    # }

# 1. Try to serve file directly, then directory, then fall back to index.php
    location / {
        try_files $uri $uri/ /php/index.php?$query_string;
    }

    # 2. PHP handling
    location ~ ^/php/(.+\.php)$ {
        try_files $uri =404;  # prevent passing non-existent .php files
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/php/$1;
        include fastcgi_params;
    }

    # Optional: hide .php extension in URLs if you want clean routes later
    # But for now, keep it explicit

    # Security: deny access to sensitive folders
    location ~ ^/(src|logs|\.env|\.git) {
        deny all;
        return 403;
    }
}
