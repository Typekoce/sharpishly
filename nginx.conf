server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.php;


    # location / {
    #     try_files $uri $uri/ /php/index.php?$query_string;
    # }

# 1. THE SPA HANDLER
    # If a file isn't found, send it to index.html so JS can take over
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. THE PHP API HANDLER
    # Any request starting with /php/ should go to your PHP Front Controller
    location /php/ {
        # This ensures /php/home/migrate goes to /php/index.php
        try_files $uri $uri/ /php/index.php?$query_string;
    }

    # # 2. PHP handling
    # location ~ ^/php/(.+\.php)$ {
    #     try_files $uri =404;  # prevent passing non-existent .php files
    #     fastcgi_pass php:9000;
    #     fastcgi_index index.php;
    #     fastcgi_param SCRIPT_FILENAME /var/www/html/php/$1;
    #     include fastcgi_params;
    # }

    # 2. PHP handling - Catch anything in /php/
    location ~ ^/php/.* {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        # Point everything to index.php so your FrontController handles the routing
        fastcgi_param SCRIPT_FILENAME /var/www/html/php/index.php;
        include fastcgi_params;
    }

    # Optional: hide .php extension in URLs if you want clean routes later
    # But for now, keep it explicit

    # Security: deny access to sensitive folders
    location ~ ^/(src|logs|\.env|\.git) {
        deny all;
        return 403;
    }
}
