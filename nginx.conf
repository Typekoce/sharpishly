server {
    listen 80;
    server_name sharpishly.vm;
    root /var/www/html/website; 
    index index.html index.php;

    access_log /var/www/html/storage/logs/nginx_access.log;
    error_log  /var/www/html/storage/logs/nginx_error.log warn;

    client_max_body_size 50M;

    # Reverse Proxy 8083 - 8080
    # location /pymvc/ {
    #     proxy_pass http://pymvc:8083; # 'pymvc' is the service name in docker-compose
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # --- SSE STREAM OPTIMIZATION ---
    # Specific rule for the Nervous System to prevent timeouts and buffering
    location /php/nervous_system/stream {
        # Disable proxy/fastcgi buffering so events appear instantly
        fastcgi_buffering off;
        fastcgi_cache off;
        
        # Keep the connection alive for 24 hours if needed
        fastcgi_read_timeout 86400s;
        fastcgi_send_timeout 86400s;

        # Standard PHP handoff
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/php/index.php;
        fastcgi_pass php:9000;
    }

    # 1. THE SPA HANDLER
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. THE MVC API HANDLER
    location /php/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/php/index.php;
        fastcgi_pass php:9000;
    }

    # 3. DIRECT PHP (Fallback)
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        include fastcgi_params;
    }

    # Security: Deny sensitive folders but ALLOW storage/logs for debugging if needed 
    # (Adjusted to allow the app to function while blocking external .env/git)
    location ~ ^/(\.env|\.git|src) {
        deny all;
    }
}