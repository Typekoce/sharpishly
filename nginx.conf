server {
    listen 80;
    
    # TIER 1 ROUTING: Capture main domain and all subdomains (docs, blog, etc.)
    server_name sharpishly.vm *.sharpishly.vm;
    
    root /var/www/html/website; 
    index index.html index.php;

    # LOGGING (Stored in the app's persistent storage)
    access_log /var/www/html/storage/logs/nginx_access.log;
    error_log  /var/www/html/storage/logs/nginx_error.log warn;

    # Performance: Allow large CSV uploads
    client_max_body_size 50M;

    # --- THE NERVOUS SYSTEM (SSE STREAM OPTIMIZATION) ---
    location /php/nervous_system/stream {
        # Disable buffering so events are "pushed" instantly to the HUD
        fastcgi_buffering off;
        fastcgi_cache off;
        
        # 24-hour persistent pulse
        fastcgi_read_timeout 86400s;
        fastcgi_send_timeout 86400s;

        # Standard PHP handoff to the Docker container
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/php/index.php;
        fastcgi_pass php:9000;
        
        # CRITICAL: Pass the host so PHP can detect the subdomain
        fastcgi_param HTTP_HOST $host;
    }

    # --- PYMVC PROXY (THE SENSES) ---
    location /pymvc/ {
        # Proxies to the 'pymvc' container service on port 8083
        proxy_pass http://pymvc:8083; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- THE MVC API HANDLER (THE BRAIN) ---
    location /php/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/php/index.php;
        fastcgi_pass php:9000;
        
        # Ensure subdomain context is preserved
        fastcgi_param HTTP_HOST $host;
    }

    # --- THE SPA HANDLER (THE SKIN) ---
    location / {
        # Check for files first, otherwise fallback to the SPA entry point
        try_files $uri $uri/ /index.html;
    }

    # DIRECT PHP FALLBACK
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_HOST $host;
    }

    # SECURITY: Deny sensitive internal paths
    location ~ ^/(\.env|\.git|src|vendor) {
        deny all;
    }
}