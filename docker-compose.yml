version: '3.8'

services:
  # --- Database Service ---
  db:
    image: mysql:8.0
    container_name: sharpishly-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # --- Main PHP Application Service ---
  php:
    build: .
    container_name: sharpishly-php
    # privileged: true
    user: "0:0" 
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - .:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - /dev:/dev
      - ./storage:/var/www/html/storage
    # devices:
    #  - "/dev/bus/usb:/dev/bus/usb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php-fpm
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # --- Background Task Worker ---
  worker:
    build: .
    container_name: sharpishly-worker
    user: "1000:1000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - .:/var/www/html
    # Flattened command to prevent YAML unmarshal errors
    command: sh -c "apt-get update && apt-get install -y usbutils iproute2 util-linux pciutils python3 python3-pip && php /var/www/html/php/src/Agents/worker.php || tail -f /dev/null"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # --- Automated Email Handler ---
  mail-agent:
    build: .
    container_name: sharpishly-mail-agent
    user: "1000:1000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - .:/var/www/html
    # Flattened command to prevent YAML unmarshal errors
    command: sh -c "apt-get update && apt-get install -y usbutils iproute2 util-linux pciutils python3 python3-pip && php /var/www/html/php/src/Agents/mail_agent.php || tail -f /dev/null"
    restart: always

  # --- Nginx Web Server ---
  web:
    image: nginx:alpine
    container_name: sharpishly-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: always

  # --- Database Management GUI ---
  adminer:
    image: adminer
    container_name: sharpishly-adminer
    restart: always
    ports:
      - "8081:8080"

  # --- Real-time Log Monitoring ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: sharpishly-logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8082:8080"
    restart: always

  # --- VPN Service ---
  vpn:
    image: linuxserver/wireguard:latest
    container_name: sharpishly-vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=sharpishly.vm
      - SERVERPORT=51820
      - PEERS=myphone,mylaptop
      - INTERNAL_CONTROL_PORT=51821
    ports:
      - "51820:51820/udp"
    volumes:
      - ./storage/vpn-config:/config
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: always

volumes:
  mysql_data: