version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sharpishly-db
    restart: always
    environment:
      MYSQL_DATABASE: sharpishly
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  php:
    build: . # Uses the Dockerfile in your root folder
    container_name: sharpishly-php
    user: "1000:1000"
    volumes:
      - ./php:/var/www/html/php
      - ./website:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      db:
        condition: service_healthy
    restart: always

  worker:
    build: . # Uses the same Dockerfile to ensure drivers exist here too
    container_name: sharpishly-worker
    user: "1000:1000"
    volumes:
      - ./php:/var/www/html/php
    command: ["php", "/var/www/html/php/src/worker-daemon.php"]
    depends_on:
      db:
        condition: service_healthy
    restart: always

  web:
    image: nginx:alpine
    container_name: sharpishly-app
    ports:
      - "8080:80"
    volumes:
      - ./website:/usr/share/nginx/html
      - ./php:/usr/share/nginx/html/php
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: always

volumes:
  mysql_data: