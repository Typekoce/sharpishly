<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse">
            <div class="position-sticky pt-3">
                <h5 class="px-3 text-primary">{{{title}}}</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">CSV Imports</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">{{{dashboard}}}</h1>
            </div>

            <form action="/php/csv/upload" enctype="multipart/form-data" method="POST">
                <fieldset>
                    <legend class="h5">Select Interrogation Source</legend>
                    <input type="file" name="csv_file" class="form-control mb-2" accept=".csv">
                    <button type="submit" class="btn btn-primary">Submit to Engine</button>
                </fieldset>
            </form>
        </main>
    </div>
</div>
