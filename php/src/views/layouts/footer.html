<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    dropZone.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', handleFile);
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.backgroundColor = '#e9ecef'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.backgroundColor = ''; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        fileInput.files = e.dataTransfer.files;
        handleFile();
    });

function handleFile() {
    const file = fileInput.files[0];
    if (!file) return;

    // Show UI progress container
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    progressBar.innerHTML = 'Uploading...';

    const formData = new FormData();
    formData.append('csv_file', file); // 'csv_file' must match the key in CsvController::upload()

    // Send to your PHP endpoint
    fetch('/php/csv/upload', {
        method: 'POST',
        body: formData
    })
    .then(response => {
        if (!response.ok) throw new Error('Upload failed');
        return response.json();
    })
    .then(data => {
        if (data.success) {
            progressBar.style.width = '100%';
            progressBar.classList.remove('bg-primary');
            progressBar.classList.add('bg-success');
            progressBar.innerHTML = 'Queued: Job #' + data.job_id;
            
            // Optional: Refresh the page after 2 seconds to show the job in the table
            setTimeout(() => window.location.reload(), 2000);
        } else {
            throw new Error(data.error || 'Unknown error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        progressBar.classList.add('bg-danger');
        progressBar.innerHTML = 'Error: ' + error.message;
    });
}
</script>

</body>
</html>
