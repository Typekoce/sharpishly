<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse">
            <div class="position-sticky pt-3">
                <h5 class="px-3 text-primary">{{{title}}}</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">CSV Imports</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">{{{dashboard}}}</h1>
            </div>

            <div class="row mb-4">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Upload Data (CSV)</h5>
                            <div class="drop-zone" id="dropZone">
                                <strong>Drag & Drop CSV File</strong> or Click to Browse
                                <input type="file" id="fileInput" hidden accept=".csv">
                            </div>
                            
                            <div class="progress-bar-container" id="progressContainer">
                                <p>Processing 50,000 rows...</p>
                                <div class="progress">
                                    <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                         id="progressBar" role="progressbar" style="width: 0%">0%</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Recent Imports</h5>
                    <div class="table-responsive">
                        <table class="table table-striped table-sm">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>File Name</th>
                                    <th>Status</th>
                                    <th>Rows</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>data_jan.csv</td>
                                    <td><span class="badge bg-success">Completed</span></td>
                                    <td>50,000</td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>data_feb.csv</td>
                                    <td><span class="badge bg-warning text-dark">Processing</span></td>
                                    <td>12,500 / 50,000</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
